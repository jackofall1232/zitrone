#
# XcodeGen project definition. Run `xcodegen generate` in apps/ios to produce
# Sublemonable.xcodeproj. See README.md in this directory for full build steps.

name: Sublemonable

options:
  bundleIdPrefix: org.sublemonable
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

# Wires Configuration/Release.xcconfig into the generated project's Release
# configuration (previously unreferenced anywhere in this file, so the
# RELAY_ONION_ADDRESS build setting it comments about was never actually
# applied to a build regardless of what the xcconfig itself contained).
configFiles:
  Release: Configuration/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    # Hardening / hygiene
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_STRICT_CONCURRENCY: minimal
    GCC_TREAT_WARNINGS_AS_ERRORS: "NO"

packages:
  # libsignal's Swift package. Pinned to the 0.56.x line — the store-protocol
  # and free-function signatures used in Sources/Crypto/SignalManager.swift
  # are documented against this line; re-verify the mapping before bumping.
  # NOTE: building libsignal from source requires a Rust toolchain (see
  # README.md → "LibSignalClient build requirements").
  LibSignalClient:
    url: https://github.com/signalapp/libsignal
    from: "0.56.0"
  Starscream:
    url: https://github.com/daltoniam/Starscream
    from: "4.0.6"

targets:
  Sublemonable:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    dependencies:
      - package: LibSignalClient
      - package: Starscream
      - target: NotificationService
        embed: true
    # Handwritten Info.plist (Support/Info.plist) referenced via
    # INFOPLIST_FILE — the `info:` generator is deliberately not used so
    # xcodegen never overwrites it.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.sublemonable.app
        INFOPLIST_FILE: Support/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        OTHER_LDFLAGS: "$(inherited)"

  NotificationService:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: NotificationService
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.sublemonable.app.notificationservice
        INFOPLIST_FILE: NotificationService/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"

  SublemonableTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    dependencies:
      - target: Sublemonable
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.sublemonable.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sublemonable.app/Sublemonable"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Sublemonable:
    build:
      targets:
        Sublemonable: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SublemonableTests
    archive:
      config: Release
