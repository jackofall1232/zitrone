services:
  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sub:${POSTGRES_PASSWORD:-sub}@postgres:5432/sublemonable?sslmode=disable
      JWT_PRIVATE_KEY_PATH: /keys/jwt.pem
      JWT_PUBLIC_KEY_PATH: /keys/jwt.pub.pem
      SERVER_PORT: "8443"
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
      MAX_PREKEYS_PER_USER: ${MAX_PREKEYS_PER_USER:-100}
      MESSAGE_TTL_UNDELIVERED_HOURS: ${MESSAGE_TTL_UNDELIVERED_HOURS:-72}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      TOR_ENABLED: ${TOR_ENABLED:-false}
      ONION_ADDRESS: ${ONION_ADDRESS:-}
    volumes:
      - ./server/keys:/keys:ro
    ports:
      - "8443:8443"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sub}
      POSTGRES_DB: sublemonable
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub -d sublemonable"]
      interval: 5s
      timeout: 3s
      retries: 10
    # No published port — only the server container reaches the database.

volumes:
  pg-data:
