#
# Optional Tor overlay — runs three hidden services on the same box:
#   1. Public download mirror  (published in docs)
#   2. Secret resilience mirror (unpublished, word-of-mouth)
#   3. Relay onion              (unpublished, baked into app)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.tor.yml up -d
#
# Read your .onion addresses:
#   docker compose exec tor cat /var/lib/tor/sublemonable-mirror-public/hostname
#   docker compose exec tor cat /var/lib/tor/sublemonable-mirror-secret/hostname
#   docker compose exec tor cat /var/lib/tor/sublemonable-relay/hostname
#
# Then set PUBLIC_ONION_ADDRESS, SECRET_ONION_ADDRESS, RELAY_ONION_ADDRESS,
# and TOR_ENABLED=true in .env and restart: docker compose ... up -d server

services:
  tor:
    build: ./tor
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - tor-data:/var/lib/tor

  server:
    # The clearnet 8443 publish from docker-compose.yml is intentionally kept.
    # A hybrid box serves the API on clearnet (behind Caddy) AND over Tor.
    # All three hidden services forward to the same port; the Go server
    # distinguishes them by Host header (see server/cmd/server/onion.go).
    environment:
      TOR_ENABLED: "true"
      ONION_SITE_DIR: /srv/onion
      PUBLIC_ONION_ADDRESS: ${PUBLIC_ONION_ADDRESS:-}
      SECRET_ONION_ADDRESS: ${SECRET_ONION_ADDRESS:-}
      RELAY_ONION_ADDRESS: ${RELAY_ONION_ADDRESS:-}
    volumes:
      - ./onion-site:/srv/onion:ro

volumes:
  tor-data:
