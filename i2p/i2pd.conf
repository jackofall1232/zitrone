# i2pd.conf — main i2pd configuration for the Sublemonable relay server.
# Server-side only: runs as an I2P router and exposes the relay API tunnel.
# No outbound proxy services (HTTP proxy, SOCKS) — those are desktop-client concerns.

[http]
# Bind the web console to all interfaces so the Docker port mapping (127.0.0.1:7070)
# is accessible from the host. Used by operators to read the B32 destination.
address = 0.0.0.0
port = 7070
enabled = true

[httpproxy]
enabled = false

[socksproxy]
enabled = false

[sam]
enabled = false

[bob]
enabled = false

[i2cp]
enabled = false
